name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Environment
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep iOS

      - name: Test
        run: |
          set -o pipefail
          # Pick a valid iOS Simulator destination from xcodebuild's own list (not simctl),
          # so the id is guaranteed to be one the scheme accepts.
          echo "iOS Simulator destinations:"
          xcodebuild -scheme AIChatSupport -showdestinations 2>/dev/null \
            | grep 'platform:iOS Simulator' | grep -v placeholder || true
          DEST_ID=$(xcodebuild -scheme AIChatSupport -showdestinations 2>/dev/null \
            | grep 'platform:iOS Simulator' \
            | grep -v placeholder \
            | grep -oE 'id:[0-9A-Fa-f-]+' \
            | head -1 | cut -d: -f2)
          if [ -z "$DEST_ID" ]; then echo "::error::No iOS Simulator destination found"; exit 1; fi
          echo "Using destination id: $DEST_ID"
          xcodebuild test \
            -scheme AIChatSupport \
            -destination "id=$DEST_ID" \
            -skipPackagePluginValidation
